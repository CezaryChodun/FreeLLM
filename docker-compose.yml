services:
  db:
    image: postgres:16
    restart: always
    container_name: freellm_db
    environment:
      POSTGRES_DB: freellm
      POSTGRES_USER: guest
      POSTGRES_PASSWORD: "Guest0000!"
    ports:
      - "7432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persists Postgres data across container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d freellm -U guest"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: freellm_postgres_data # Named volume for Postgres data persistence